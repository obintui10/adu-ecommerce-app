<div class="container">
  <!-- Logo -->
  <img src="static/images/logo.png" alt="App Logo" width="120">
  <h1>Welcome to ADU Ecommerce</h1>

  <!-- Login Section -->
  <section class="login-section">
    <form>
      <label for="username">Username</label>
      <input id="username" type="text" placeholder="Enter username" required>
      
      <label for="password">Password</label>
      <input id="password" type="password" placeholder="Enter password" required>
      
      <button type="submit" class="btn-primary">Login</button>
    </form>
  </section>

  <!-- Product Section -->
  <section class="products">
    <div class="product-card">
      <img src="static/images/product1.png" alt="Sneakers on sale - 30% off" width="250">
      <h2>Modern Sneakers</h2>
      <p>Comfortable athletic sneakers with stylish design.</p>
      <button class="btn-buy">Buy Now</button>
    </div>
    <!-- Add more product cards here -->
  </section>
</div>
