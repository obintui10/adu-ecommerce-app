<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ADU Ecommerce App</title>
    <link rel="stylesheet" href="static/reset.css">
    <link rel="stylesheet" href="static/theme.css">
    <link rel="stylesheet" href="static/style.css">
</head>
<body>
    <div class="container">
        <!-- Logo -->
        <img src="static/images/logo.png" alt="App Logo" width="120">
        <h1>Welcome to ADU Ecommerce</h1>

        <!-- Login Form -->
        <form>
            <input type="text" placeholder="Username" required>
            <input type="password" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>

        <!-- Product Showcase -->
        <div class="product-card">
            <img src="static/images/product1.png" alt="Sneakers Product" width="250">
            <h2>Modern Sneakers</h2>
            <p>Comfortable athletic sneakers with stylish design.</p>
            <button>Buy Now</button>
        </div>
    </div>

    <script src="static/app.js"></script>
</body>
</html>
