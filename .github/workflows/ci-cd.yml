name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  # -------------------------------
  # 1. Build Docker Image
  # -------------------------------
  build-image:
    runs-on: [self-hosted, macOS, x64]
    outputs:
      image: adu-ecommerce-app:latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Build Docker Image
        run: |
          docker build -t adu-ecommerce-app:latest .
          echo "image=adu-ecommerce-app:latest" >> $GITHUB_OUTPUT

  # -------------------------------
  # 2. Run Tests
  # -------------------------------
  test-app:
    runs-on: [self-hosted, macOS, x64]
    needs: build-image
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Run Unit Tests
        run: |
          npm install
          npm test

  # -------------------------------
  # 3. SonarQube Scan
  # -------------------------------
  sonar-scan:
    runs-on: [self-hosted, macOS, x64]
    needs: test-app
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Run SonarQube Scan
        run: |
          docker run --rm \
            -v $(pwd):/usr/src \
            -w /usr/src \
            sonarsource/sonar-scanner-cli:latest \
            -Dsonar.projectKey=cicd \
            -Dsonar.sources=. \
            -Dsonar.host.url=${{ secrets.SONAR_HOST_URL }} \
            -Dsonar.login=${{ secrets.SONAR_TOKEN }}

  # -------------------------------
  # 4. Push Docker Image to Docker Hub
  # -------------------------------
  push-image:
    runs-on: [self-hosted, macOS, x64]
    needs: sonar-scan
    steps:
      - name: Docker Hub Login
        run: |
          echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USER }}" --password-stdin

      - name: Push Docker Image
        run: |
          docker tag adu-ecommerce-app:latest obidocker380/adu-ecommerce-app:latest
          docker push obidocker380/adu-ecommerce-app:latest

  # -------------------------------
  # 5. Deploy to Minikube
  # -------------------------------
  deploy-minikube:
    runs-on: [self-hosted, macOS, x64]
    needs: push-image
    steps:
      - name: Deploy to Minikube
        run: |
          # Use Minikube Docker daemon
          eval $(minikube -p minikube docker-env)
          # Apply Kubernetes deployment (correct folder spelling)
          kubectl apply -f kubernetes/deployment.yml
