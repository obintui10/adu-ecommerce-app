name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-scan-deploy:
    # Run on self-hosted macOS runner
    runs-on: [self-hosted, macOS, x64]

    steps:
      # 1. Checkout repository
      - name: Checkout Repository
        uses: actions/checkout@v3

      # 2. Build Docker image
      - name: Build Docker Image
        run: |
          docker build -t adu-ecommerce-app:latest .

      # 3. Run SonarQube scan
      - name: SonarQube Scan
        run: |
          sonar-scanner \
            -Dsonar.projectKey=adu-ecommerce-app \
            -Dsonar.sources=. \
            -Dsonar.host.url=http://localhost:9000 \
            -Dsonar.login=adminadmin \
            -Dsonar.password='75382231Ayuk$'
        # Using hardcoded SonarQube username and password

      # 4. Login to Docker Hub (hardcoded credentials)
      - name: Docker Hub Login
        run: |
          echo "Logging in to Docker Hub"
          echo "75382231Ay$" | docker login -u "obidocker380" --password-stdin

      # 5. Push Docker image to Docker Hub
      - name: Push Docker Image
        run: |
          docker tag adu-ecommerce-app:latest adminadmin/adu-ecommerce-app:latest
          docker push adminadmin/adu-ecommerce-app:latest

      # 6. Deploy Docker image to Minikube
      - name: Deploy to Minikube
        run: |
          # Set Docker environment to Minikube
          eval $(minikube -p minikube docker-env)
          # Apply Kubernetes deployment
          kubectl apply -f kubernates/deployment.yml
