apiVersion: apps/v1
kind: Deployment
metadata:
  name: adu-ecommerce
spec:
  replicas: 1
  selector:
    matchLabels:
      app: adu-ecommerce
  template:
    metadata:
      labels:
        app: adu-ecommerce
    spec:
      containers:
      - name: adu-ecommerce
        image: obidocker380/adu-ecommerce-app:latest
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: adu-ecommerce
spec:
  type: NodePort
  selector:
    app: adu-ecommerce
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
